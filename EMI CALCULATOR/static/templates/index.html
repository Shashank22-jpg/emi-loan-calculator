<!DOCTYPE html>
<html>
<head>

<title>EMI Calculator</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>EMI Loan Calculator</h1>

<form method="post">

<input type="number" name="principal" placeholder="Loan Amount" required>

<input type="number" step="0.01" name="rate" placeholder="Interest Rate (%)" required>

<input type="number" name="time" placeholder="Loan Time (Years)" required>

<button type="submit">Calculate EMI</button>

</form>

{% if emi %}

<div class="result">
    <canvas id="myChart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const principal = Number("{{ request.form.get('principal', 0) }}");
const interest = Number("{{ total_interest or 0 }}");

var ctx = document.getElementById('myChart').getContext('2d');

new Chart(ctx,{
type:'pie',
data:{
labels:['Principal','Interest'],
datasets:[{
data:[principal,interest]
}]
}
});

</script>

<h2>Monthly EMI : ₹ {{emi}}</h2>
<p>Total Payment : ₹ {{total_payment}}</p>
<p>Total Interest : ₹ {{total_interest}}</p>

</div>

{% endif %}

</div>

</body>
</html>
